<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더존하우징 청주 박람회 비품 체크리스트</title>
    <!-- Google Fonts: Inter & Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2d2d2d;
            --accent: #C3003B;
            --accent-light: #fef2f2;
            --border: #cbd5e1;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            line-height: 1.5;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* A4 Page Container */
        .a4-container {
            width: 210mm;
            min-height: 297mm;
            background-color: var(--bg-card);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 20mm 15mm;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Document Header */
        .doc-header {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .doc-meta {
            text-align: right;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            line-height: 1.6;
        }

        /* Document Titles */
        .doc-title {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .doc-subtitle {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Controls Panel (No Print) */
        .control-panel {
            width: 210mm;
            background-color: #1e293b;
            color: #cbd5e1;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .add-form {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .add-input {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 12.5px;
            font-family: inherit;
        }

        .add-input:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: #a80032;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #334155;
        }

        /* Checklist Table */
        .checklist-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .checklist-table th {
            background-color: #f8fafc;
            border-top: 1px solid var(--primary);
            border-bottom: 2px solid var(--primary);
            padding: 10px 8px;
            font-weight: 800;
            font-size: 12px;
            color: var(--primary);
            text-align: left;
        }

        .checklist-table td {
            border-bottom: 1px solid var(--border);
            padding: 8px;
            font-size: 12px;
            vertical-align: middle;
        }

        .checklist-table tr:hover {
            background-color: #fafafa;
        }

        /* Table Checkbox Column */
        .col-check { width: 45px; text-align: center; }
        .col-no { width: 45px; text-align: center; color: var(--text-muted); }
        .col-item { font-weight: 600; }
        .col-qty { width: 90px; font-weight: 700; }
        .col-remarks { color: #334155; }
        .col-actions { width: 50px; text-align: center; }

        /* Custom Checkbox */
        .chk-container {
            display: inline-block;
            position: relative;
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            width: 18px;
            height: 18px;
        }

        .chk-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background-color: #fff;
            border: 2px solid #94a3b8;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .chk-container:hover input ~ .checkmark {
            border-color: var(--accent);
        }

        .chk-container input:checked ~ .checkmark {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .chk-container input:checked ~ .checkmark:after {
            display: block;
        }

        .chk-container .checkmark:after {
            left: 5px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* Group Rows */
        .group-header {
            background-color: #f1f5f9;
            font-weight: 700;
            font-size: 11.5px;
            color: #334155;
            padding: 6px 10px !important;
            border-top: 1px solid var(--border);
        }

        /* Delete Button */
        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-delete:hover {
            background-color: #fee2e2;
        }

        /* Blank Row (For Handwriting) */
        .blank-row td {
            height: 32px;
        }

        .blank-line {
            width: 90%;
            border-bottom: 1px dashed #cbd5e1;
            display: inline-block;
            height: 15px;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        /* Print Media Styles */
        @media print {
            body {
                background-color: white;
                color: black;
                padding: 0;
                margin: 0;
            }

            .control-panel, .btn-delete, .no-print {
                display: none !important;
            }

            .a4-container {
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 10mm 10mm;
                width: 210mm;
                height: 297mm;
                box-sizing: border-box;
            }

            .chk-container {
                border: 1px solid #000;
                border-radius: 4px;
            }

            .checkmark {
                border: none;
            }

            .checklist-table th {
                background-color: #f8fafc !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .group-header {
                background-color: #e2e8f0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

    <!-- Script to manage rows dynamically -->
    <script>
        const defaultEquipmentItems = [
            { id: 1, category: "🛋️ 상담 및 부스 운영 비품", name: "상담테이블 & 테이블보", qty: "8개", remarks: "", completed: false },

            { id: 4, category: "📂 계약 및 사무 기기", name: "종건 & 하우징 카드리더기", qty: "-", remarks: "", completed: false },

            { id: 14, category: "🚗 기획부 차량 적재 (별도 출발)", name: "인포비품 + 회사외투", qty: "1박스", remarks: "기획부 차량 적재", completed: false },
            { id: 15, category: "🚗 기획부 차량 적재 (별도 출발)", name: "스피커 & 앰프", qty: "1박스", remarks: "기획부 차량 적재", completed: false },

            { id: 17, category: "☕ 식음료 및 공통 비품", name: "커피포트", qty: "-", remarks: "", completed: false },
            { id: 18, category: "☕ 식음료 및 공통 비품", name: "생수", qty: "-", remarks: "", completed: false }
        ];

        let eqItems = [];

        function loadItems() {
            const saved = localStorage.getItem('cheongjuEquipmentList');
            if (saved) {
                try {
                    eqItems = JSON.parse(saved);
                } catch(e) {
                    eqItems = JSON.parse(JSON.stringify(defaultEquipmentItems));
                }
            } else {
                eqItems = JSON.parse(JSON.stringify(defaultEquipmentItems));
                saveItems();
            }
            renderTable();
        }

        function saveItems() {
            localStorage.setItem('cheongjuEquipmentList', JSON.stringify(eqItems));
        }

        function toggleItem(id, completed) {
            // Find in local memory
            const item = eqItems.find(i => String(i.id) === String(id));
            if (item) {
                item.completed = completed;
                saveItems();
            }
        }

        function addCustomRow() {
            const nameInput = document.getElementById('add-name');
            const qtyInput = document.getElementById('add-qty');
            const remarksInput = document.getElementById('add-remarks');

            const name = nameInput.value.trim();
            const qty = qtyInput.value.trim() || "-";
            const remarks = remarksInput.value.trim();

            if (!name) {
                alert("품명을 입력해주세요.");
                return;
            }

            const newId = 'custom-' + Date.now();
            eqItems.push({
                id: newId,
                category: "➕ 별도 추가 비품 (현장 추가)",
                name: name,
                qty: qty,
                remarks: remarks,
                completed: false,
                isCustom: true
            });

            saveItems();
            renderTable();

            // Clear inputs
            nameInput.value = "";
            qtyInput.value = "";
            remarksInput.value = "";
        }

        function deleteCustomRow(id) {
            eqItems = eqItems.filter(i => String(i.id) !== String(id));
            saveItems();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('checklist-body');
            tbody.innerHTML = '';

            // Group items by category
            const categories = [
                "🛋️ 상담 및 부스 운영 비품",
                "📂 계약 및 사무 기기",
                "📖 책자 및 배포 인쇄물",
                "🏢 본사 3층 보관 비품",
                "🚗 기획부 차량 적재 (별도 출발)",
                "☕ 식음료 및 공통 비품",
                "➕ 별도 추가 비품 (현장 추가)"
            ];

            let rowNo = 1;

            categories.forEach(cat => {
                const catItems = eqItems.filter(i => i.category === cat);
                if (catItems.length === 0 && cat !== "➕ 별도 추가 비품 (현장 추가)") {
                    return;
                }
                if (cat === "➕ 별도 추가 비품 (현장 추가)" && catItems.length === 0) {
                    return;
                }

                // Render group header
                const headerTr = document.createElement('tr');
                headerTr.innerHTML = `<td colspan="6" class="group-header">${cat}</td>`;
                tbody.appendChild(headerTr);

                // Render items
                catItems.forEach(item => {
                    const tr = document.createElement('tr');
                    if (item.isCustom) {
                        tr.id = `custom-row-${item.id}`;
                    }
                    tr.innerHTML = `
                        <td class="col-check no-print">
                            <label class="chk-container">
                                <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleItem('${item.id}', this.checked)">
                                <span class="checkmark"></span>
                            </label>
                        </td>
                        <td class="col-no">${rowNo++}</td>
                        <td class="col-item">${item.name}</td>
                        <td class="col-qty">${item.qty}</td>
                        <td class="col-remarks">${item.remarks}</td>
                        <td class="col-actions no-print">
                            ${item.isCustom ? `<button class="btn-delete" onclick="deleteCustomRow('${item.id}')">삭제</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            });

            // Render handwriting rows (Print Only)
            const hwHeader = document.createElement('tr');
            hwHeader.innerHTML = `<td colspan="6" class="group-header no-print">✍️ 자필 추가 작성용 (인쇄 여백)</td>`;
            tbody.appendChild(hwHeader);

            for (let i = 0; i < 5; i++) {
                const tr = document.createElement('tr');
                tr.className = 'blank-row';
                tr.innerHTML = `
                    <td class="col-check no-print"></td>
                    <td class="col-no">${rowNo++}</td>
                    <td class="col-item"><span class="blank-line"></span></td>
                    <td class="col-qty"><span class="blank-line" style="width: 70%;"></span></td>
                    <td class="col-remarks"><span class="blank-line"></span></td>
                    <td class="col-actions no-print"></td>
                `;
                tbody.appendChild(tr);
            }
        }

        // Listen for storage updates
        window.addEventListener('storage', (e) => {
            if (e.key === 'cheongjuEquipmentList') {
                loadItems();
            }
        });

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            loadItems();
        });
    </script>
</body>
</html>
